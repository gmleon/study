    Revisit.onDataReceive(() => {
      const countries = DATA.filter((d) => d.iso3c !== "ABNJ");
      const abnj = DATA.find((d) => d.iso3c === "ABNJ");

      const width = 820, height = 460;
      const margins = { top: 30, right: 50, bottom: 50, left: 60 };
      const innerW = width - margins.left - margins.right;
      const innerH = height - margins.top - margins.bottom;

      const xScale = d3.scaleLog().domain([10, 100000000]).range([0, innerW]);
      const xTicks = [10, 100, 1000, 10000, 100000, 1000000, 10000000, 100000000];
      const yScale = d3.scaleLinear().domain([0, 100]).range([innerH, 0]);
      const yTicks = [0, 10, 25, 50, 75, 100];

      const regions = [
        "Sub-Saharan Africa", "East Asia & Pacific", "Europe & Central Asia",
        "Middle East, North Africa, Afghanistan & Pakistan", "Latin America & Caribbean",
        "South Asia", "North America",
      ];
      const colorScale = d3.scaleOrdinal(regions, d3.schemeTableau10);

      const svg = d3.select("#scatter").attr("width", width).attr("height", height);

      svg.append("text")
        .attr("x", margins.left).attr("y", 18)
        .style("font-size", "15px").style("font-weight", "bold")
        .text("Marine protected areas by country");

      // ── Legend ──────────────────────────────────────────────────────
      const legend = svg.append("g").attr("transform", `translate(${margins.left}, 26)`);
      let legendX = 0, legendRow = 0;
      regions.forEach((r) => {
        const itemW = r.length * 6.2 + 26;
        if (legendX + itemW > innerW && legendX > 0) { legendX = 0; legendRow += 1; }
        const g = legend.append("g").attr("transform", `translate(${legendX}, ${legendRow * 16})`);
        g.append("rect").attr("width", 10).attr("height", 10).attr("rx", 2).attr("fill", colorScale(r));
        g.append("text").attr("x", 14).attr("y", 9).style("font-size", "10px").text(r);
        legendX += itemW;
      });
      const legendRows = 2;

      const chartTop = margins.top + 26 + legendRows * 16;
      const g = svg.append("g").attr("transform", `translate(${margins.left},${chartTop})`);
      const chartInnerH = height - chartTop - margins.bottom;
      yScale.range([chartInnerH, 0]);

      // Axes
      g.append("g")
        .attr("transform", `translate(0,${chartInnerH})`)
        .call(d3.axisBottom(xScale).tickValues(xTicks).tickFormat(d3.format("~s")));
      g.append("g").call(d3.axisLeft(yScale).tickValues(yTicks).tickFormat((d) => d + "%"));

      g.append("text")
        .attr("x", innerW / 2).attr("y", chartInnerH + 38)
        .attr("text-anchor", "middle").style("font-size", "11px")
        .text("Total marine area (logarithmic scale)");
      g.append("text")
        .attr("transform", "rotate(-90)")
        .attr("x", -chartInnerH / 2).attr("y", -45)
        .attr("text-anchor", "middle").style("font-size", "11px")
        .text("Percentage of total marine area covered by MPAs");

      // Reference line at 0% (baseline)
      g.append("line")
        .attr("x1", 0).attr("x2", innerW)
        .attr("y1", yScale(0)).attr("y2", yScale(0))
        .attr("stroke", "black").attr("stroke-width", 1.5);

      const radius = 5;
      const tooltip = d3.select("#mpa-tooltip");

      function showTooltip(evt, d) {
        tooltip
          .style("display", "block")
          .style("left", evt.clientX + 14 + "px")
          .style("top", evt.clientY + 10 + "px")
          .html(
            "<strong>" + d.country + "</strong><br>" +
            d3.format(",.0f")(d.totalmarinearea) + " km² total marine area<br>" +
            d3.format(",.1f")(d.PAmarinecover) + "% protected"
          );
      }
      function hideTooltip() {
        tooltip.style("display", "none");
      }

      g.selectAll("circle.dot")
        .data(countries)
        .join("circle")
        .attr("class", "dot")
        .attr("cx", (d) => xScale(d.totalmarinearea))
        .attr("cy", (d) => yScale(d.PAmarinecover))
        .attr("r", radius)
        .attr("fill", (d) => colorScale(d.region))
        .on("mouseover", (evt, d) => { showTooltip(evt, d); highlightHover(d); })
        .on("mousemove", (evt, d) => showTooltip(evt, d))
        .on("mouseout", (evt, d) => { hideTooltip(); highlightHover(null); });

      // ABNJ special point + label
      if (abnj) {
        g.append("circle")
          .attr("class", "dot")
          .attr("cx", xScale(abnj.totalmarinearea))
          .attr("cy", yScale(abnj.PAmarinecover))
          .attr("r", radius)
          .attr("fill", "#888")
          .on("mouseover", (evt) => { showTooltip(evt, abnj); })
          .on("mousemove", (evt) => showTooltip(evt, abnj))
          .on("mouseout", hideTooltip);
        g.append("text")
          .attr("x", xScale(abnj.totalmarinearea) - 8)
          .attr("y", yScale(abnj.PAmarinecover) + 4)
          .attr("text-anchor", "end")
          .style("font-size", "10px").style("font-style", "italic")
          .text("Areas beyond national jurisdiction");
      }

      const hoverRing = g.append("circle").attr("class", "dot-outline").attr("r", radius + 3).style("display", "none");
      function highlightHover(d) {
        if (!d) { hoverRing.style("display", "none"); return; }
        hoverRing
          .attr("cx", xScale(d.totalmarinearea)).attr("cy", yScale(d.PAmarinecover))
          .style("display", null);
      }

      // ── Search bar / country picker ────────────────────────────────
      const datalist = document.getElementById("countryList");
      countries
        .slice()
        .sort((a, b) => a.country.localeCompare(b.country))
        .forEach((d) => {
          const opt = document.createElement("option");
          opt.value = d.country;
          datalist.appendChild(opt);
        });

      const searchRing = g.append("circle").attr("class", "dot-outline").style("display", "none");
      const searchLabel = g.append("text").attr("class", "country-label").style("display", "none");

      function selectCountry(name) {
        const match = countries.find((d) => d.country.toLowerCase() === name.toLowerCase());
        if (!match) {
          searchRing.style("display", "none");
          searchLabel.style("display", "none");
          return;
        }
        const cx = xScale(match.totalmarinearea), cy = yScale(match.PAmarinecover);
        searchRing.attr("cx", cx).attr("cy", cy).attr("r", radius + 3).style("display", null);
        searchLabel.attr("x", cx + 10).attr("y", cy + 4).text(match.country).style("display", null);
      }

      document.getElementById("countrySearch").addEventListener("input", (evt) => {
        selectCountry(evt.target.value);
      });
    });
  </script>
</html>
