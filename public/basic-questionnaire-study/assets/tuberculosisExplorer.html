    Revisit.onDataReceive(() => {
      const worldSeries = DATA.worldSeries;
      const countryYear = DATA.countryYear;
      const years = worldSeries.map((d) => d.year);

      let hoveredYear = 2015;

      // ── Line chart: worldwide TB incidence trend ──────────────────────
      const lineWidth = 820, lineHeight = 150;
      const m = { top: 60, right: 30, bottom: 40, left: 55 };
      const lineInnerW = lineWidth - m.left - m.right;
      const lineInnerH = lineHeight - m.top - m.bottom;

      const lineSvg = d3.select("#line-chart")
        .attr("width", lineWidth)
        .attr("height", lineHeight);

      lineSvg.append("text")
        .attr("x", m.left).attr("y", 20)
        .style("font-size", "15px").style("font-weight", "bold")
        .text("Worldwide trend of tuberculosis cases estimated");

      const x = d3.scaleLinear().domain(d3.extent(years)).range([0, lineInnerW]);
      const y = d3.scaleLinear().domain([0, d3.max(worldSeries, (d) => d.value)]).nice().range([lineInnerH, 0]);

      const g = lineSvg.append("g").attr("transform", `translate(${m.left},${m.top})`);

      g.append("g")
        .attr("transform", `translate(0,${lineInnerH})`)
        .call(d3.axisBottom(x).tickFormat(d3.format("d")));
      g.append("g").call(d3.axisLeft(y).ticks(4));

      g.append("text")
        .attr("x", lineInnerW / 2).attr("y", lineInnerH + 34)
        .attr("text-anchor", "middle").style("font-size", "11px")
        .text("Year");
      g.append("text")
        .attr("transform", "rotate(-90)")
        .attr("x", -lineInnerH / 2).attr("y", -40)
        .attr("text-anchor", "middle").style("font-size", "11px")
        .text("Cases per 100,000");

      const line = d3.line().x((d) => x(d.year)).y((d) => y(d.value)).curve(d3.curveMonotoneX);

      g.append("path")
        .datum(worldSeries)
        .attr("fill", "none")
        .attr("stroke", "#e63946")
        .attr("stroke-width", 2.5)
        .attr("d", line);

      const rule = g.append("line")
        .attr("y1", 0).attr("y2", lineInnerH)
        .attr("stroke", "#555").attr("stroke-width", 1)
        .attr("stroke-dasharray", "4,3")
        .attr("pointer-events", "none");

      const dot = g.append("circle")
        .attr("r", 5).attr("fill", "#e63946")
        .attr("pointer-events", "none");

      const hoverLabel = g.append("text")
        .attr("y", -12).style("font-size", "12px").style("font-weight", "bold");

      function moveTo(year) {
        const point = worldSeries.find((d) => d.year === year);
        if (!point) return;
        const px = x(year);
        rule.attr("x1", px).attr("x2", px);
        dot.attr("cx", px).attr("cy", y(point.value));
        hoverLabel
          .attr("x", Math.min(Math.max(px, 60), lineInnerW - 140))
          .text(`${year} — ${d3.format(",.1f")(point.value)} per 100,000`);
      }

      g.append("rect")
        .attr("width", lineInnerW).attr("height", lineInnerH)
        .attr("fill", "transparent")
        .on("pointermove", (event) => {
          const [px] = d3.pointer(event);
          const year = Math.round(x.invert(px));
          if (years.includes(year) && year !== hoveredYear) {
            hoveredYear = year;
            moveTo(year);
            renderTreemap(year);
          }
        });

      moveTo(hoveredYear);

      // ── Treemap: TB incidence by region and country for hoveredYear ───
      const tmWidth = 900, tmHeight = 460, legendH = 60;
      const tmSvg = d3.select("#treemap")
        .attr("width", tmWidth)
        .attr("height", 30 + legendH + tmHeight);

      const titleText = tmSvg.append("text")
        .attr("x", 0).attr("y", 18)
        .style("font-size", "18px").style("font-weight", "bold");

      const legendGroup = tmSvg.append("g").attr("transform", "translate(0, 30)");
      legendGroup.append("text")
        .attr("x", 0).attr("y", 10)
        .style("font-size", "11px").style("font-weight", "bold").style("fill", "#444")
        .text("Region");
      const legendSwatches = legendGroup.append("g").attr("transform", "translate(0, 18)");

      const treemapGroup = tmSvg.append("g").attr("transform", `translate(0,${30 + legendH})`);

      function renderTreemap(year) {
        const yearData = countryYear.filter((d) => d.year === year);

        const root = d3.hierarchy({
          children: d3.groups(yearData, (d) => d.region)
            .map(([region, countries]) => ({ region, children: countries })),
        })
          .sum((d) => d.value)
          .sort((a, b) => b.value - a.value);

        d3.treemap().size([tmWidth, tmHeight]).paddingTop(18).paddingInner(1).paddingOuter(3)(root);

        const regions = root.children.map((d) => d.data.region);
        const baseColor = d3.scaleOrdinal(regions, d3.schemeTableau10);

        const valueExtent = d3.extent(yearData, (d) => d.value);
        const lightness = d3.scaleLinear(valueExtent, [0.78, 0.25]);

        function cellColor(d) {
          const hsl = d3.hsl(baseColor(d.parent.data.region));
          hsl.l = lightness(d.data.value);
          return hsl.toString();
        }

        titleText.text(`Tuberculosis incidence by region and country — Year ${year}`);

        const swatchW = 12, swatchGap = 4;
        const legendItems = legendSwatches.selectAll("g.legend-item").data(regions, (d) => d);
        legendItems.exit().remove();
        const legendEnter = legendItems.enter().append("g").attr("class", "legend-item");
        legendEnter.append("rect").attr("width", swatchW).attr("height", swatchW).attr("rx", 2);
        legendEnter.append("text").attr("x", swatchW + swatchGap).attr("y", 10).style("font-size", "11px");

        const merged = legendEnter.merge(legendItems);
        let xOff = 0, rowIdx = 0;
        merged.each(function (r) {
          const itemW = r.length * 6.5 + swatchW + swatchGap + 10;
          if (xOff + itemW > tmWidth && xOff > 0) {
            xOff = 0;
            rowIdx += 1;
          }
          d3.select(this).attr("transform", `translate(${xOff}, ${rowIdx * 20})`);
          xOff += itemW;
        });
        merged.select("rect").attr("fill", (d) => baseColor(d));
        merged.select("text").text((d) => d);

        const regionNodes = treemapGroup.selectAll("g.region").data(root.children, (d) => d.data.region);
        regionNodes.exit().remove();
        const regionEnter = regionNodes.enter().append("g").attr("class", "region");
        regionEnter.append("rect").attr("class", "region-outline").attr("fill", "none").attr("stroke-width", 1.5);
        regionEnter.append("rect").attr("class", "region-header");
        regionEnter.append("text").attr("class", "region-label")
          .style("font-size", "10px").style("font-weight", "bold").style("fill", "white");

        const regionMerged = regionEnter.merge(regionNodes);
        regionMerged.select("rect.region-outline")
          .attr("x", (d) => d.x0).attr("y", (d) => d.y0)
          .attr("width", (d) => d.x1 - d.x0).attr("height", (d) => d.y1 - d.y0)
          .attr("stroke", (d) => baseColor(d.data.region));
        regionMerged.select("rect.region-header")
          .attr("x", (d) => d.x0).attr("y", (d) => d.y0)
          .attr("width", (d) => d.x1 - d.x0).attr("height", 17)
          .attr("fill", (d) => baseColor(d.data.region));
        regionMerged.select("text.region-label")
          .attr("x", (d) => d.x0 + 4).attr("y", (d) => d.y0 + 12)
          .text((d) => (d.x1 - d.x0 > 60 ? d.data.region : ""));

        const cells = treemapGroup.selectAll("g.cell").data(root.leaves(), (d) => d.data.code);
        cells.exit().remove();
        const cellEnter = cells.enter().append("g").attr("class", "cell");
        cellEnter.append("rect").attr("stroke", "white").attr("stroke-width", 0.5);
        cellEnter.append("text").style("font-size", "10px").style("pointer-events", "none");
        cellEnter.append("title");

        const cellMerged = cellEnter.merge(cells);
        cellMerged.attr("transform", (d) => `translate(${d.x0},${d.y0})`);
        cellMerged.select("rect")
          .attr("width", (d) => d.x1 - d.x0).attr("height", (d) => d.y1 - d.y0)
          .attr("fill", cellColor);
        cellMerged.select("text")
          .attr("x", 3).attr("y", 12)
          .style("fill", (d) => (lightness(d.data.value) < 0.5 ? "white" : "black"))
          .text((d) => (d.x1 - d.x0 > 40 && d.y1 - d.y0 > 16 ? d.data.country : ""));
        cellMerged.select("title")
          .text((d) => `${d.data.country} (${d.parent.data.region})\n${d3.format(",.1f")(d.data.value)} per 100,000`);
      }

      renderTreemap(hoveredYear);
    });
  </script>
